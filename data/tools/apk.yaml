name: apk
binary: apk
aliases:
- alpine-package-keeper
category:
- package-manager
- environment
lang:
- all
platform:
- linux
summary: Alpine Linux package manager for installing and updating system packages in Alpine hosts and containers.
homepage: https://wiki.alpinelinux.org/wiki/Alpine_Package_Keeper
docs: https://docs.alpinelinux.org/user-handbook/0.1a/Working/apk.html
detect:
  version_args:
  - --version
  local:
    files:
    - /etc/alpine-release
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Install OS-level dependencies on Alpine Linux hosts or containers
- Reproduce Dockerfile or setup instructions that require apk packages
avoid_when:
- The dependency belongs in the project package manager instead of the host OS
- Running on a non-Alpine Linux distribution
risk:
  level: high
  effects:
  - install_packages
  - execute_code
  - network_access
  - write_files
  - environment_mutation
  requires_auth: true
  destructive: false
  confirmation_required_for:
  - installing system packages
  - upgrading system packages
  - removing packages
  - changing repositories
guardrails:
- Check the Alpine version and package availability before installing.
- Ask before add, upgrade, del, repository, or cache mutation commands.
- In Dockerfiles, prefer explicit packages and avoid unnecessary cache writes.
