name: az
binary: az
aliases: []
category: cloud
lang:
- all
summary: Microsoft Azure command-line interface.
homepage: https://github.com/Azure/azure-cli
docs: https://learn.microsoft.com/cli/azure/
detect:
  version_args:
  - --version
  local:
    files:
    - azure-pipelines.yml
    - azure-pipelines.yaml
    - staticwebapp.config.json
    dirs:
    - .azure
    package_json:
      package_manager_prefixes: []
use_when:
- Inspect or operate Azure resources
avoid_when:
- Subscription, tenant, or credentials are unknown
risk:
  level: high
  effects:
  - network_access
  - requires_auth
  - remote_read
  - remote_write
  - cloud_mutation
  - secret_exposure
  requires_auth: true
  destructive: true
  confirmation_required_for:
  - deleting resources
  - changing subscriptions
  - deploying infrastructure
guardrails:
- Confirm active subscription before write operations.
