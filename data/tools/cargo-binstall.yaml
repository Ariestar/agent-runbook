name: cargo-binstall
binary: cargo-binstall
aliases: []
category: package-manager
lang:
- rust
summary: Install Rust binary crates from prebuilt artifacts when available.
homepage: https://github.com/cargo-bins/cargo-binstall
docs: https://github.com/cargo-bins/cargo-binstall#readme
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Install Rust CLI tools faster than building from source
avoid_when:
- Reproducible source builds are required
risk:
  level: medium
  effects:
  - install_packages
  - network_access
  - write_files
  - execute_code
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - installing global binaries
guardrails:
- Confirm the crate and source before installing global tools.
