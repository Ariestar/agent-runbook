name: cargo-deny
binary: cargo-deny
aliases: []
category: rust
summary: Rust dependency policy checker for advisories, licenses, bans, and sources.
homepage: https://github.com/EmbarkStudios/cargo-deny
docs: https://embarkstudios.github.io/cargo-deny/
detect:
  version_args: ["--version"]
  local:
    files: ["deny.toml"]
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
  - Enforce Rust dependency license, advisory, and source policies
avoid_when:
  - The project has no Rust dependency policy
risk:
  level: medium
  effects:
    - network_access
    - read_files
  requires_auth: false
  destructive: false
  confirmation_required_for: []
guardrails:
  - Use existing deny.toml policy before proposing dependency changes.
