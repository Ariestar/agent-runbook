name: claude
binary: claude
aliases: []
category:
- agent
lang:
- all
summary: Anthropic Claude Code command-line coding assistant.
homepage: https://www.anthropic.com/claude-code
docs: https://docs.anthropic.com/en/docs/claude-code
detect:
  version_args:
  - --version
  local:
    files:
    - CLAUDE.md
    dirs:
    - .claude
    package_json:
      package_manager_prefixes: []
use_when:
- Use Claude Code project instructions or workflows
avoid_when:
- The task should not call a separate AI coding assistant
risk:
  level: high
  effects:
  - execute_code
  - network_access
  - write_files
  - secret_exposure
  requires_auth: true
  destructive: false
  confirmation_required_for:
  - committing generated changes
guardrails:
- Review tool permissions and diffs before accepting edits.
