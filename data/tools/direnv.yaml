name: direnv
binary: direnv
aliases: []
category: environment
summary: Per-directory shell environment loader.
homepage: https://github.com/direnv/direnv
docs: https://direnv.net/
detect:
  version_args: ["version"]
  local:
    files: [".envrc"]
    dirs: [".direnv"]
    package_json:
      package_manager_prefixes: []
use_when:
  - Load project-specific environment variables and PATH changes
avoid_when:
  - The .envrc file has not been reviewed
risk:
  level: high
  effects:
    - execute_code
    - secret_exposure
    - environment_mutation
  requires_auth: false
  destructive: false
  confirmation_required_for:
    - allowing a new .envrc
guardrails:
  - Read .envrc before running direnv allow.
