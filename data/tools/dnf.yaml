name: dnf
binary: dnf
aliases:
- yum
category:
- package-manager
- environment
lang:
- all
platform:
- linux
summary: Fedora, RHEL, and compatible Linux package manager for system packages.
homepage: https://github.com/rpm-software-management/dnf
docs: https://dnf.readthedocs.io/en/latest/command_ref.html
detect:
  version_args:
  - --version
  local:
    files:
    - /etc/fedora-release
    - /etc/redhat-release
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Install OS-level dependencies on Fedora, RHEL, Rocky, AlmaLinux, or compatible images
- Reproduce setup instructions that require dnf or yum packages
avoid_when:
- The dependency belongs in the project package manager instead of the host OS
- Running on a non-RPM Linux distribution or a locked-down environment
risk:
  level: high
  effects:
  - install_packages
  - execute_code
  - network_access
  - write_files
  - environment_mutation
  requires_auth: true
  destructive: false
  confirmation_required_for:
  - installing system packages
  - upgrading system packages
  - removing packages
  - enabling repositories or modules
guardrails:
- Check the distribution and package name before installing.
- Ask before install, upgrade, remove, autoremove, module, or repository mutation commands.
- Avoid broad system upgrades during project tasks unless explicitly requested.
