name: docker
binary: docker
aliases: []
category: container
lang:
- all
summary: Container build and runtime CLI.
homepage: https://www.docker.com/
docs: https://docs.docker.com/reference/cli/docker/
detect:
  version_args:
  - --version
  local:
    files:
    - Dockerfile
    - docker-compose.yml
    - docker-compose.yaml
    - compose.yml
    - compose.yaml
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Build and run containerized projects
- Inspect local container state
avoid_when:
- Docker daemon is not available
- The task does not require containers
risk:
  level: high
  effects:
  - execute_code
  - network_access
  - read_files
  - write_files
  - remote_read
  - remote_write
  requires_auth: false
  destructive: true
  confirmation_required_for:
  - removing containers
  - removing images
  - removing volumes
  - pushing images
guardrails:
- Verify the Docker daemon before blaming project code for Docker failures.
