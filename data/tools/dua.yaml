name: dua
binary: dua
aliases: []
category: file-viewer
lang:
- all
summary: Disk usage analyzer for finding large files and directories.
homepage: https://github.com/Byron/dua-cli
docs: https://github.com/Byron/dua-cli#readme
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Inspect disk usage interactively or from the terminal
avoid_when:
- The task only needs a simple directory listing
risk:
  level: medium
  effects:
  - read_files
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - deleting files from interactive mode
guardrails:
- Do not delete files from disk usage tools without explicit confirmation.
