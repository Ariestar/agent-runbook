name: dust
binary: dust
aliases: []
category:
- file-viewer
lang:
- all
summary: Visual disk usage summary for directories.
homepage: https://github.com/bootandy/dust
docs: https://github.com/bootandy/dust#readme
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Find large directories quickly
avoid_when:
- Exact file-level accounting is required for automation
risk:
  level: low
  effects:
  - read_files
  requires_auth: false
  destructive: false
  confirmation_required_for: []
guardrails:
- Limit scan scope on very large filesystems.
