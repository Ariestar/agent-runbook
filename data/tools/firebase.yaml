name: firebase
binary: firebase
aliases: []
category: cloud
summary: Firebase project management and deployment CLI.
homepage: https://github.com/firebase/firebase-tools
docs: https://firebase.google.com/docs/cli
detect:
  version_args: ["--version"]
  local:
    files: ["firebase.json", ".firebaserc"]
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
  - Deploy or inspect Firebase projects
avoid_when:
  - Active project or authentication state is unknown
risk:
  level: high
  effects:
    - network_access
    - requires_auth
    - remote_read
    - remote_write
    - deployment
    - secret_exposure
  requires_auth: true
  destructive: true
  confirmation_required_for:
    - deploying services
    - deleting Firebase resources
guardrails:
  - Confirm active Firebase project before write operations.
