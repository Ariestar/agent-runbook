name: flyctl
binary: flyctl
aliases: ["fly"]
category: cloud
summary: Fly.io command-line tool.
homepage: https://github.com/superfly/flyctl
docs: https://fly.io/docs/flyctl/
detect:
  version_args: ["version"]
  local:
    files: ["fly.toml"]
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
  - Deploy or inspect Fly.io applications
avoid_when:
  - The task does not explicitly involve Fly.io
risk:
  level: high
  effects:
    - network_access
    - requires_auth
    - remote_read
    - remote_write
    - cloud_mutation
  requires_auth: true
  destructive: true
  confirmation_required_for:
    - deploys
    - scaling apps
    - destroying apps or volumes
guardrails:
  - Confirm target app and organization before Fly.io write operations.
