name: grep
binary: grep
aliases: []
category: search
lang:
- all
summary: Classic line-oriented text search.
homepage: https://www.gnu.org/software/grep/
docs: https://www.gnu.org/software/grep/manual/
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Search text in files or streams on systems without rg
avoid_when:
- ripgrep is available for recursive codebase search
risk:
  level: low
  effects:
  - read_files
  requires_auth: false
  destructive: false
  confirmation_required_for: []
guardrails:
- Prefer rg for repository-wide searches when available.
