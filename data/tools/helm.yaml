name: helm
binary: helm
aliases: []
category: kubernetes
lang:
- all
summary: Kubernetes package manager for charts.
homepage: https://github.com/helm/helm
docs: https://helm.sh/docs/helm/
detect:
  version_args:
  - version
  - --short
  local:
    files:
    - Chart.yaml
    dirs:
    - charts
    package_json:
      package_manager_prefixes: []
use_when:
- Work with Kubernetes Helm charts
avoid_when:
- The task does not involve Kubernetes chart packaging or release management
risk:
  level: high
  effects:
  - network_access
  - requires_auth
  - remote_read
  - remote_write
  - cloud_mutation
  requires_auth: true
  destructive: true
  confirmation_required_for:
  - installing or upgrading releases
  - uninstalling releases
guardrails:
- Check Kubernetes context and namespace before Helm write operations.
