name: jq
binary: jq
aliases: []
category: data
summary: Command-line JSON processor.
homepage: https://github.com/jqlang/jq
docs: https://jqlang.github.io/jq/manual/
detect:
  version_args: ["--version"]
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
  - Query or transform JSON
  - Inspect machine-readable command output
avoid_when:
  - Editing JSON files in place without validating the output
risk:
  level: medium
  effects:
    - read_files
    - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
    - overwriting files with redirected output
guardrails:
  - Validate jq output before overwriting existing files.
