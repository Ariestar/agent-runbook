name: kind
binary: kind
aliases: []
category:
- kubernetes
lang:
- all
summary: Run local Kubernetes clusters in Docker containers.
homepage: https://github.com/kubernetes-sigs/kind
docs: https://kind.sigs.k8s.io/
detect:
  version_args:
  - version
  local:
    files:
    - kind.yaml
    - kind.yml
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Create local Kubernetes clusters for testing
avoid_when:
- Docker is unavailable or the task targets a remote cluster
risk:
  level: high
  effects:
  - execute_code
  - network_access
  - write_files
  - container_mutation
  requires_auth: false
  destructive: true
  confirmation_required_for:
  - deleting clusters
  - loading local images
guardrails:
- Name clusters explicitly to avoid modifying the wrong local cluster.
