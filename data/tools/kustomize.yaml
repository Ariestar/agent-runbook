name: kustomize
binary: kustomize
aliases: []
category: kubernetes
summary: Kubernetes configuration customization tool.
homepage: https://github.com/kubernetes-sigs/kustomize
docs: https://kubectl.docs.kubernetes.io/references/kustomize/
detect:
  version_args: ["version"]
  local:
    files: ["kustomization.yaml", "kustomization.yml", "Kustomization"]
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
  - Build or inspect Kustomize Kubernetes manifests
avoid_when:
  - The repository uses Helm or plain manifests without Kustomize
risk:
  level: medium
  effects:
    - read_files
    - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
    - applying generated manifests
guardrails:
  - Review generated manifests before applying to a cluster.
