name: minikube
binary: minikube
aliases: []
category: kubernetes
lang:
- all
summary: Local Kubernetes development cluster manager.
homepage: https://github.com/kubernetes/minikube
docs: https://minikube.sigs.k8s.io/docs/
detect:
  version_args:
  - version
  local:
    files: []
    dirs:
    - .minikube
    package_json:
      package_manager_prefixes: []
use_when:
- Start or inspect a local Kubernetes cluster
avoid_when:
- The task targets a managed remote Kubernetes cluster
risk:
  level: high
  effects:
  - execute_code
  - network_access
  - write_files
  - container_mutation
  requires_auth: false
  destructive: true
  confirmation_required_for:
  - deleting clusters
  - changing cluster drivers
guardrails:
- Check current profile before mutating a minikube cluster.
