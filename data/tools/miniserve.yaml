name: miniserve
binary: miniserve
aliases: []
category: network
lang:
- all
summary: Small CLI for serving files over HTTP.
homepage: https://github.com/svenstaro/miniserve
docs: https://github.com/svenstaro/miniserve#readme
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Temporarily serve local files over HTTP
avoid_when:
- Files contain secrets or should not be exposed on the network
risk:
  level: high
  effects:
  - network_access
  - read_files
  - secret_exposure
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - binding to public interfaces
guardrails:
- Bind to localhost unless the user explicitly wants network exposure.
