name: mise
binary: mise
aliases:
- rtx
category:
- environment
lang:
- all
summary: Development tool version manager and task runner.
homepage: https://github.com/jdx/mise
docs: https://mise.jdx.dev/
detect:
  version_args:
  - --version
  local:
    files:
    - mise.toml
    - .mise.toml
    - .tool-versions
    dirs:
    - .mise
    package_json:
      package_manager_prefixes: []
use_when:
- Install or select project tool versions
- Run tasks defined by mise
avoid_when:
- Tool versions should be managed by another project-specific manager
risk:
  level: medium
  effects:
  - install_packages
  - execute_code
  - network_access
  - environment_mutation
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - trusting project config
guardrails:
- Review mise.toml before installing tools from a new project.
