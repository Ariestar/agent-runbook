name: mongosh
binary: mongosh
aliases: []
category: database
lang:
- all
summary: MongoDB Shell for querying and administering MongoDB.
homepage: https://github.com/mongodb-js/mongosh
docs: https://www.mongodb.com/docs/mongodb-shell/
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Query or inspect MongoDB databases
avoid_when:
- Connection target or credentials are unknown
risk:
  level: high
  effects:
  - network_access
  - remote_read
  - remote_write
  - secret_exposure
  requires_auth: true
  destructive: true
  confirmation_required_for:
  - dropping collections
  - deleting data
  - running migrations
guardrails:
- Confirm database and collection before write operations.
