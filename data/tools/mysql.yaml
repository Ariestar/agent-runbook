name: mysql
binary: mysql
aliases: []
category:
- database
lang:
- sql
summary: MySQL command-line client.
homepage: https://www.mysql.com/
docs: https://dev.mysql.com/doc/refman/en/mysql.html
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Inspect MySQL or MariaDB databases
avoid_when:
- Connection target and environment are unclear
risk:
  level: high
  effects:
  - network_access
  - requires_auth
  - remote_read
  - remote_write
  - secret_exposure
  requires_auth: true
  destructive: true
  confirmation_required_for:
  - update statements
  - delete statements
  - schema migrations
guardrails:
- Confirm host, database, and environment before mutating MySQL data.
