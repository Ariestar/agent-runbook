name: netlify
binary: netlify
aliases: []
category:
- cloud
lang:
- all
summary: Netlify CLI for local development and deployment.
homepage: https://github.com/netlify/cli
docs: https://cli.netlify.com/
detect:
  version_args:
  - --version
  local:
    files:
    - netlify.toml
    dirs:
    - .netlify
    package_json:
      package_manager_prefixes: []
use_when:
- Develop or deploy Netlify projects
avoid_when:
- The task does not explicitly involve Netlify
risk:
  level: high
  effects:
  - network_access
  - requires_auth
  - remote_write
  - cloud_mutation
  requires_auth: true
  destructive: false
  confirmation_required_for:
  - deploys
  - site configuration changes
guardrails:
- Confirm deployment intent before creating remote Netlify deployments.
