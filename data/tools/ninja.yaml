name: ninja
binary: ninja
aliases: []
category:
- build
lang:
- c
- cpp
summary: Small build system focused on speed.
homepage: https://github.com/ninja-build/ninja
docs: https://ninja-build.org/manual.html
detect:
  version_args:
  - --version
  local:
    files:
    - build.ninja
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Build projects generated for Ninja
avoid_when:
- The repository has no Ninja build file or preset
risk:
  level: medium
  effects:
  - execute_code
  - read_files
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - installing build artifacts
guardrails:
- Prefer the configured build directory generated by the project.
