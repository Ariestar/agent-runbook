name: pandoc
binary: pandoc
aliases: []
category:
- docs
- text
lang:
- markdown
platform:
- local
summary: Universal document converter for Markdown, HTML, DOCX, LaTeX, and more.
homepage: https://pandoc.org/
docs: https://pandoc.org/MANUAL.html
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Convert documents between markup and publishing formats
- Extract readable text from supported document sources
avoid_when:
- Layout fidelity matters more than text content
risk:
  level: medium
  effects:
  - read_files
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - overwriting source documents
guardrails:
- Write converted output to a new file unless the user requests replacement.
