name: pdftoppm
binary: pdftoppm
aliases: []
category:
- docs
- file-viewer
lang:
- all
summary: Poppler CLI for rendering PDF pages to image files.
homepage: https://poppler.freedesktop.org/
docs: https://www.mankier.com/1/pdftoppm
detect:
  version_args:
  - -v
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Render PDF pages for visual inspection or OCR workflows
avoid_when:
- Text extraction is enough
risk:
  level: medium
  effects:
  - read_files
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - rendering large page ranges
guardrails:
- Limit page ranges when rendering large PDFs.
