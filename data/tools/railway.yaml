name: railway
binary: railway
aliases: []
category: deploy
lang:
- all
summary: Railway deployment and project management CLI.
homepage: https://github.com/railwayapp/cli
docs: https://docs.railway.com/reference/cli-api
detect:
  version_args:
  - --version
  local:
    files:
    - railway.json
    dirs:
    - .railway
    package_json:
      package_manager_prefixes: []
use_when:
- Deploy or inspect Railway projects
avoid_when:
- Project link or authentication state is unknown
risk:
  level: high
  effects:
  - network_access
  - requires_auth
  - remote_read
  - remote_write
  - deployment
  - secret_exposure
  requires_auth: true
  destructive: true
  confirmation_required_for:
  - deploying services
  - deleting services
  - changing variables
guardrails:
- Confirm the linked Railway project before write operations.
