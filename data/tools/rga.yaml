name: rga
binary: rga
aliases: ["ripgrep-all"]
category: search
summary: ripgrep wrapper for PDFs, archives, e-books, Office documents, and more.
homepage: https://github.com/phiresky/ripgrep-all
docs: https://github.com/phiresky/ripgrep-all#readme
detect:
  version_args: ["--version"]
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
  - Search non-plain-text files and archives
avoid_when:
  - Plain source code search with rg is enough
risk:
  level: medium
  effects:
    - read_files
    - execute_code
  requires_auth: false
  destructive: false
  confirmation_required_for:
    - indexing very large directories
guardrails:
  - Prefer rg for normal source search and rga for document/archive search.
