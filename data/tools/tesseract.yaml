name: tesseract
binary: tesseract
aliases: []
category:
- docs
- image
- text
lang:
- all
summary: OCR engine CLI for extracting text from images and scanned documents.
homepage: https://github.com/tesseract-ocr/tesseract
docs: https://tesseract-ocr.github.io/tessdoc/Command-Line-Usage.html
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Extract text from screenshots, scans, or image-only PDFs after rendering pages
avoid_when:
- The source already has selectable text
risk:
  level: medium
  effects:
  - read_files
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for: []
guardrails:
- Verify OCR output against the image when accuracy matters.
