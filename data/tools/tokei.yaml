name: tokei
binary: tokei
aliases: []
category:
- metrics
lang:
- all
summary: Count code, comments, blanks, and files by language.
homepage: https://github.com/XAMPPRocky/tokei
docs: https://github.com/XAMPPRocky/tokei#readme
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Summarize repository language and line-count composition
avoid_when:
- Exact build graph or dependency analysis is required
risk:
  level: low
  effects:
  - read_files
  requires_auth: false
  destructive: false
  confirmation_required_for: []
guardrails:
- Treat line counts as orientation, not engineering quality metrics.
