name: trufflehog
binary: trufflehog
aliases: []
category: security
lang:
- all
summary: Secret scanner for repositories, filesystems, and remote sources.
homepage: https://github.com/trufflesecurity/trufflehog
docs: https://github.com/trufflesecurity/trufflehog#readme
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Scan git history or filesystems for secrets
avoid_when:
- Results would expose secret values in shared logs
risk:
  level: high
  effects:
  - read_files
  - network_access
  - secret_exposure
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - printing verified secrets
guardrails:
- Redact detected secrets and avoid uploading sensitive scan output.
