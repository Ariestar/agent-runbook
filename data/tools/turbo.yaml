name: turbo
binary: turbo
aliases: []
category: javascript-build
summary: High-performance build system for JavaScript and TypeScript monorepos.
homepage: https://github.com/vercel/turborepo
docs: https://turborepo.com/docs/reference/run
detect:
  version_args: ["--version"]
  local:
    files: ["turbo.json"]
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
  - Run Turborepo tasks in JS or TS monorepos
avoid_when:
  - The project has no turbo.json or package scripts using turbo
risk:
  level: medium
  effects:
    - execute_code
    - network_access
    - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
    - remote cache configuration changes
guardrails:
  - Prefer package manager scripts that wrap turbo commands.
