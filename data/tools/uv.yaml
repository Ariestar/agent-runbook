name: uv
binary: uv
aliases: []
category: package-manager
lang:
- python
summary: Fast Python package and environment manager.
homepage: https://github.com/astral-sh/uv
docs: https://docs.astral.sh/uv/
detect:
  version_args:
  - --version
  local:
    files:
    - uv.lock
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Manage Python dependencies and environments in uv projects
avoid_when:
- The project clearly uses Poetry, Conda, or plain pip only
risk:
  level: medium
  effects:
  - install_packages
  - execute_code
  - network_access
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - changing lockfiles
guardrails:
- If uv.lock exists, prefer uv for Python package and environment commands.
