name: vitest
binary: vitest
aliases: []
category: test
lang:
- javascript
- typescript
summary: Vite-native JavaScript and TypeScript test runner.
homepage: https://github.com/vitest-dev/vitest
docs: https://vitest.dev/guide/cli
detect:
  version_args:
  - --version
  local:
    files:
    - vitest.config.js
    - vitest.config.ts
    - vitest.config.mjs
    - vitest.workspace.ts
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Run Vitest unit or component tests
avoid_when:
- The project uses Jest or another configured test runner
risk:
  level: medium
  effects:
  - execute_code
  - read_files
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - updating snapshots
guardrails:
- Prefer focused test files while iterating.
