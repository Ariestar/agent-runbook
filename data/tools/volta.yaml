name: volta
binary: volta
aliases: []
category: environment
lang:
- javascript
- typescript
summary: JavaScript toolchain manager for pinning Node, npm, pnpm, and yarn.
homepage: https://github.com/volta-cli/volta
docs: https://docs.volta.sh/
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Use a project-pinned JavaScript toolchain
avoid_when:
- The repo uses another Node version manager and no Volta config
risk:
  level: medium
  effects:
  - install_packages
  - network_access
  - environment_mutation
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - changing pinned tool versions
guardrails:
- Only treat Volta as local requirement when package.json declares a volta section.
