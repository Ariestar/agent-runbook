name: websocat
binary: websocat
aliases: []
category:
- network
- api
lang:
- all
summary: Command-line client and relay for WebSocket connections.
homepage: https://github.com/vi/websocat
docs: https://github.com/vi/websocat#readme
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Test WebSocket endpoints or pipe WebSocket messages in scripts
avoid_when:
- The endpoint requires credentials that should not be exposed in logs
risk:
  level: medium
  effects:
  - network_access
  - read_files
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - sending state-changing messages
guardrails:
- Redact tokens and confirm before sending mutating WebSocket messages.
