name: winget
binary: winget
aliases:
- Windows Package Manager
category:
- package-manager
- environment
lang:
- all
platform:
- windows
summary: Microsoft Windows Package Manager for installing and updating desktop apps and developer tools.
homepage: https://github.com/microsoft/winget-cli
docs: https://learn.microsoft.com/windows/package-manager/winget/
detect:
  version_args:
  - --version
  local:
    files: []
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Install or update Windows applications and developer tools from configured winget sources
- Check whether a Windows tool has an official package id
avoid_when:
- The task requires project-local dependencies managed by the repository package manager
- A reproducible machine bootstrap script already standardizes on Scoop, Chocolatey, or Nix
risk:
  level: high
  effects:
  - install_packages
  - execute_code
  - network_access
  - write_files
  - environment_mutation
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - installing global tools
  - upgrading installed packages
  - uninstalling packages
  - accepting package or source agreements
guardrails:
- Prefer exact package ids over fuzzy names before installing.
- Ask before install, upgrade, uninstall, import, or source mutation commands.
- Review installer source and publisher for unfamiliar packages.
