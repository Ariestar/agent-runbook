name: yazi
binary: yazi
aliases: []
category:
- file-viewer
lang:
- all
summary: Fast terminal file manager with async I/O.
homepage: https://github.com/sxyazi/yazi
docs: https://yazi-rs.github.io/
detect:
  version_args:
  - --version
  local:
    files: []
    dirs:
    - .config/yazi
    package_json:
      package_manager_prefixes: []
use_when:
- Explore and manage files interactively in the terminal
avoid_when:
- Automated workflows require auditable file operations
risk:
  level: medium
  effects:
  - read_files
  - write_files
  requires_auth: false
  destructive: false
  confirmation_required_for:
  - deleting or moving files
guardrails:
- Use explicit shell commands for scripted file mutations.
