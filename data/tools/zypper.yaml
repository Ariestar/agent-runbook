name: zypper
binary: zypper
aliases: []
category:
- package-manager
- environment
lang:
- all
platform:
- linux
summary: openSUSE and SUSE Linux package manager for installing and updating system packages.
homepage: https://en.opensuse.org/Portal:Zypper
docs: https://documentation.suse.com/smart/systems-management/html/concept-zypper/index.html
detect:
  version_args:
  - --version
  local:
    files:
    - /etc/SuSE-release
    - /etc/zypp/zypp.conf
    dirs: []
    package_json:
      package_manager_prefixes: []
use_when:
- Install OS-level dependencies on openSUSE, SLES, or compatible images
- Reproduce setup instructions that require zypper packages
avoid_when:
- The dependency belongs in the project package manager instead of the host OS
- Running on a non-SUSE Linux distribution or a locked-down environment
risk:
  level: high
  effects:
  - install_packages
  - execute_code
  - network_access
  - write_files
  - environment_mutation
  requires_auth: true
  destructive: false
  confirmation_required_for:
  - installing system packages
  - upgrading system packages
  - removing packages
  - changing repositories
guardrails:
- Check the distribution and package name before installing.
- Ask before install, update, dist-upgrade, remove, repository, or service mutation commands.
- Avoid broad system upgrades during project tasks unless explicitly requested.
